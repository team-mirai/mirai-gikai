# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: ja-JP

reviews:
  profile: chill
  request_changes_workflow: true
  high_level_summary: true
  sequence_diagrams: true
  auto_review:
    enabled: true
    drafts: true
    ignore_title_keywords: []
    labels:
      - "!skip-ai-review"
      - "!no-bots"
      - "!dependencies"
    ignore_usernames:
      - "dependabot"
      - "renovate"
  path_filters:
    - "admin/**"
    - "web/**"
    - "packages/**"
    - "supabase/**"
    - "docs/**"
    - "!**/*.md"
    - "!**/*.mdx"
    - "!**/*.svg"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.jpeg"
    - "!**/*.gif"
    - "!**/*.lock"
    - "!**/pnpm-lock.yaml"
    - "!**/yarn.lock"
    - "!**/package-lock.json"
    - "!**/dist/**"
    - "!**/.next/**"
    - "!**/coverage/**"
    - "!**/*.snap"
